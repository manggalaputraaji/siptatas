<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <title>LEXACORE | Dashboard Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="sidebar-container">
        <button class="mobile-nav-toggle" aria-label="Toggle menu"><span></span></button>
        <button class="mobile-nav-toggle" aria-label="Toggle menu"><span></span></button>
        <div class="nav-menu">
            <img src="logo.png" class="sidebar-logo">
            <a href="dashboard.html" class="nav-link-custom active">HOME DASHBOARD</a>
            <a href="form.html" class="nav-link-custom">INPUT PELANGGARAN</a>
            <a href="database.html" class="nav-link-custom">DATABASE PELANGGAR</a>
        </div>
        
        <div class="profile-section">
            <div class="profile-box">
                <img id="fotoSiswa" src="" class="profile-pic-sm" alt="P">
                <div>
                    <small class="fw-bold d-block">HALO!</small>
                    <span id="adminName" class="fw-bold d-block" style="font-size: 13px;">Admin</span>
                    <small style="font-size: 9px;">Administrator</small>
                </div>
            </div>
            <button class="btn btn-dark w-100 mt-3 fw-bold" onclick="logout()" style="border: 3px solid #000; border-radius: 12px;">LOGOUT</button>
        </div>
    </div>

    <div class="main-content">
        <h1 style="font-weight: 800; font-size: 55px; margin-bottom: 45px;">DASHBOARD ADMIN</h1>

        <div class="stats-row">
            <div class="box-statistik">
                <span class="stat-label">KEMARIN</span>
                <div id="countLalu" class="stat-number" style="color: #bbb;">0</div>
                <hr style="border: 2px solid #000; opacity: 1; margin: 25px 0;">
                <span class="stat-label">HARI INI</span>
                <div class="d-flex align-items-center">
                    <div id="countSekarang" class="stat-number">0</div>
                    <span id="trend" class="ms-3 fs-2 fw-bold" style="color: red;">▲</span>
                </div>
            </div>

            <div class="box-grafik">
                <span class="stat-label mb-3 d-block">STATISTIK PELANGGAR</span>
                <div style="position: relative; height: 280px; width: 100%;">
                    <canvas id="chartPelanggaran"></canvas>
                </div>
            </div>
        </div>

        <div class="box-bawah">
            <span class="stat-label mb-4 d-block">PELANGGARAN TERAKHIR</span>
            <div class="table-responsive">
                <table class="table text-center">
                    <thead>
                        <tr>
                            <th>NAMA</th>
                            <th>KELAS</th>
                            <th>PELANGGARAN</th>
                            <th>POIN</th>
                            <th>TANGGAL</th>
                        </tr>
                    </thead>
                    <tbody id="tableContent">
                        <tr><td colspan="5">Memproses Data Sheets...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const DB_ID = '19aDh5DCRpV0FJzxa7Yw6teAhnRwHOCP-zS3g8-YA_sg';
        const url = `https://docs.google.com/spreadsheets/d/${DB_ID}/gviz/tq?tqx=out:json`;

        // Fungsi parse tanggal dari Google Sheets
        function parseDate(dateStr) {
            if (!dateStr) return null;
            if (dateStr instanceof Date) return dateStr;
            // Try to parse '4/30/2026 9:13:24' or '30/04/2026 09:13:24'
            let d = Date.parse(dateStr.replace(/,/g, ''));
            if (!isNaN(d)) return new Date(d);

            // Try manual split (for DD/MM/YYYY or MM/DD/YYYY)
            const parts = dateStr.split(/[\/\s:]+/);
            if (parts.length >= 3) {
                let day = parseInt(parts[0]), month = parseInt(parts[1]), year = parseInt(parts[2]);
                if (year < 1000) year += 2000;
                // If month > 12, swap day and month
                if (month > 12) [day, month] = [month, day];
                return new Date(year, month - 1, day);
            }
            return new Date(dateStr);
        }

        // Format tanggal untuk display
        function formatDate(date) {
            if (!date) return '-';
            const d = new Date(date);
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = d.getFullYear();
            return `${day}/${month}/${year}`;
        }

        // Hitung pelanggaran per hari (7 hari terakhir)
        function calculateDailyData(rows) {
            const now = new Date();
            const days = [];
            
            // Generate 7 hari terakhir
            for (let i = 6; i >= 0; i--) {
                const d = new Date(now);
                d.setDate(d.getDate() - i);
                d.setHours(0, 0, 0, 0);
                const end = new Date(d);
                end.setHours(23, 59, 59, 999);
                
                const dayNames = ['Min', 'Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab'];
                days.push({
                    date: d,
                    label: dayNames[d.getDay()],
                    fullLabel: `${d.getDate()}/${d.getMonth() + 1}`,
                    count: 0
                });
            }

            // Hitung pelanggaran per hari
            rows.forEach(r => {
                const tgl = r.c[4]?.f || r.c[4]?.v;
                if (!tgl) return;
                
                const date = parseDate(tgl);
                if (!date || isNaN(date.getTime())) return;

                days.forEach(day => {
                    const dayStart = new Date(day.date);
                    dayStart.setHours(0, 0, 0, 0);
                    const dayEnd = new Date(day.date);
                    dayEnd.setHours(23, 59, 59, 999);
                    
                    if (date >= dayStart && date <= dayEnd) {
                        day.count++;
                    }
                });
            });

            return days;
        }

        // Hitung statistik hari ini vs kemarin
        function calculateStats(rows) {
            const now = new Date();
            now.setHours(0, 0, 0, 0);
            
            const yesterday = new Date(now);
            yesterday.setDate(yesterday.getDate() - 1);

            let countSekarang = 0;
            let countLalu = 0;

            rows.forEach(r => {
                const tgl = r.c[4]?.f || r.c[4]?.v;
                if (!tgl) return;
                
                const date = parseDate(tgl);
                if (!date || isNaN(date.getTime())) return;

                const dateOnly = new Date(date);
                dateOnly.setHours(0, 0, 0, 0);

                if (dateOnly.getTime() === now.getTime()) {
                    countSekarang++;
                } else if (dateOnly.getTime() === yesterday.getTime()) {
                    countLalu++;
                }
            });

            return { countSekarang, countLalu };
        }

        async function init() {
            try {
                const res = await fetch(url);
                const text = await res.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;

                // Hitung statistik harian
                const stats = calculateStats(rows);
                const dailyData = calculateDailyData(rows);

                // Update statistik
                document.getElementById('countSekarang').innerText = stats.countSekarang;
                document.getElementById('countLalu').innerText = stats.countLalu;

                // Update label
                document.querySelector('.box-statistik .stat-label:first-child').innerText = 'KEMARIN';
                document.querySelector('.box-statistik .stat-label:nth-child(4)').innerText = 'HARI INI';

                // Update trend indicator
                const trendEl = document.getElementById('trend');
                const diff = stats.countSekarang - stats.countLalu;
                if (diff > 0) {
                    trendEl.innerHTML = '▲';
                    trendEl.style.color = 'red';
                } else if (diff < 0) {
                    trendEl.innerHTML = '▼';
                    trendEl.style.color = 'green';
                } else {
                    trendEl.innerHTML = '═';
                    trendEl.style.color = 'gray';
                }

                // Render semua pelanggaran dari database
                const allViolations = rows
                    .map(r => ({
                        nama: r.c[0]?.v || '-',
                        kelas: r.c[1]?.v || '-',
                        hal: r.c[2]?.v || '-',
                        poin: r.c[3]?.v || '-',
                        tgl: r.c[4]?.f || r.c[4]?.v || '-',
                        date: parseDate(r.c[4]?.f || r.c[4]?.v)
                    }))
                    .filter(r => r.date)
                    .sort((a, b) => b.date - a.date);

                let html = '';
                if (allViolations.length === 0) {
                    html = '<tr><td colspan="5" class="text-muted">Tidak ada data pelanggaran</td></tr>';
                } else {
                    allViolations.forEach(r => {
                        html += `<tr>
                            <td class="fw-bold">${r.nama}</td>
                            <td>${r.kelas}</td>
                            <td class="text-uppercase small">${r.hal}</td>
                            <td><span class="badge ${getPoinColor(r.poin)} p-2 px-3">${r.poin}</span></td>
                            <td class="text-muted small">${r.tgl}</td>
                        </tr>`;
                    });
                }
                document.getElementById('tableContent').innerHTML = html;

                // Render chart dengan data harian
                renderChart(dailyData);
            } catch (e) { 
                console.error("Error:", e); 
                document.getElementById('tableContent').innerHTML = '<tr><td colspan="5" class="text-danger">Gagal memuat data</td></tr>';
            }
        }

        function renderChart(dailyData) {
            const ctx = document.getElementById('chartPelanggaran').getContext('2d');
            
            const labels = dailyData.map(d => d.label);
            const data = dailyData.map(d => d.count);

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Pelanggaran',
                        data: data,
                        borderColor: '#dc3545',
                        backgroundColor: 'rgba(220, 53, 69, 0.1)',
                        borderWidth: 4,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#000',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 3,
                        pointRadius: 6,
                        pointHoverRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#000',
                            titleFont: { size: 14, weight: 'bold' },
                            bodyFont: { size: 13 },
                            padding: 12,
                            cornerRadius: 8,
                            callbacks: {
                                label: function(context) {
                                    const fullLabel = dailyData[context.dataIndex].fullLabel;
                                    return `${fullLabel}: ${context.raw} pelanggaran`;
                                }
                            }
                        }
                    },
                    scales: { 
                        y: { 
                            beginAtZero: true,
                            ticks: { stepSize: 1 },
                            grid: { color: 'rgba(0,0,0,0.1)' }
                        }, 
                        x: { 
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        // Auto-refresh setiap 30 detik untuk sinkronisasi internet
        setInterval(init, 30000);

        window.onload = () => {
            document.getElementById('adminName').innerText = localStorage.getItem('namaLengkap') || 'Admin';
            const foto = localStorage.getItem('fotoProfil');
            if (foto) document.getElementById('fotoSiswa').src = foto;
            init();
        };

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }

        document.querySelector('.mobile-nav-toggle').addEventListener('click', function() {
            document.querySelector('.sidebar-container').classList.toggle('active');
        });

        function getPoinColor(p) {
            if (p === 'Ringan') return 'bg-success';
            if (p === 'Sedang') return 'bg-warning text-dark';
            if (p === 'Berat') return 'bg-danger';
            return 'bg-secondary';
        }
    </script>
</body>
</html>
