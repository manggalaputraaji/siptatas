<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <title>LEXACORE | Dashboard Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- MOBILE TOGGLE: OUTSIDE THE SIDEBAR -->
  <button class="mobile-nav-toggle" aria-label="Toggle menu"><span></span></button>

  <div class="sidebar-container">
    <div class="nav-menu">
      <img src="logo.png" class="sidebar-logo" alt="Logo">
      <a href="dashboard.html" class="nav-link-custom active">HOME DASHBOARD</a>
      <a href="form.html" class="nav-link-custom">INPUT PELANGGARAN</a>
      <a href="database.html" class="nav-link-custom">DATABASE PELANGGAR</a>
    </div>

    <div class="profile-section">
      <div class="profile-box">
        <img id="fotoSiswa" src="" class="profile-pic-sm" alt="P">
        <div>
          <small class="fw-bold d-block">HALO!</small>
          <span id="adminName" class="fw-bold d-block" style="font-size: 13px;">Admin</span>
          <small style="font-size: 9px;">Administrator</small>
        </div>
      </div>
      <button class="btn btn-dark w-100 mt-3 fw-bold" onclick="logout()" style="border: 3px solid #000; border-radius: 12px;">LOGOUT</button>
    </div>
  </div>

  <div class="main-content">
    <h1 style="font-weight: 800; font-size: 55px; margin-bottom: 45px;">DASHBOARD ADMIN</h1>

    <div class="stats-row">
      <div class="box-statistik">
        <span class="stat-label">KEMARIN</span>
        <div id="countLalu" class="stat-number" style="color: #bbb;">0</div>
        <hr style="border: 2px solid #000; opacity: 1; margin: 25px 0;">
        <span class="stat-label">HARI INI</span>
        <div class="d-flex align-items-center">
          <div id="countSekarang" class="stat-number">0</div>
          <span id="trend" class="ms-3 fs-2 fw-bold" style="color: red;">▲</span>
        </div>
      </div>

      <div class="box-grafik">
        <span class="stat-label mb-3 d-block">STATISTIK PELANGGAR</span>
        <div style="position: relative; height: 280px; width: 100%;">
          <canvas id="chartPelanggaran"></canvas>
        </div>
      </div>
    </div>

    <div class="box-bawah">
      <span class="stat-label mb-4 d-block">PELANGGARAN TERAKHIR</span>
      <div class="table-responsive">
        <table class="table text-center">
          <thead>
            <tr>
              <th>NAMA</th>
              <th>KELAS</th>
              <th>PELANGGARAN</th>
              <th>POIN</th>
              <th>TANGGAL</th>
            </tr>
          </thead>
          <tbody id="tableContent">
            <tr><td colspan="5">Memproses Data Sheets...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Consolidated script: data + toggle (idempotent) -->
  <script>
  (function(){
    if (window.__lexacore_dashboard_init) return;
    window.__lexacore_dashboard_init = true;

    const DB_ID = '19aDh5DCRpV0FJzxa7Yw6teAhnRwHOCP-zS3g8-YA_sg';
    const url = `https://docs.google.com/spreadsheets/d/${DB_ID}/gviz/tq?tqx=out:json`;

    function parseDate(dateStr) {
      if (!dateStr) return null;
      if (dateStr instanceof Date) return dateStr;
      let d = Date.parse(String(dateStr).replace(/,/g, ''));
      if (!isNaN(d)) return new Date(d);
      const parts = String(dateStr).split(/[\/\s:]+/);
      if (parts.length >= 3) {
        let day = parseInt(parts[0]), month = parseInt(parts[1]), year = parseInt(parts[2]);
        if (year < 1000) year += 2000;
        if (month > 12) [day, month] = [month, day];
        return new Date(year, month - 1, day);
      }
      return new Date(dateStr);
    }

    function calculateDailyData(rows) {
      const now = new Date();
      const days = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(d.getDate() - i);
        d.setHours(0,0,0,0);
        const dayNames = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
        days.push({ date: d, label: dayNames[d.getDay()], fullLabel: `${d.getDate()}/${d.getMonth()+1}`, count: 0 });
      }
      rows.forEach(r => {
        const tgl = r.c[4]?.f || r.c[4]?.v;
        if (!tgl) return;
        const date = parseDate(tgl);
        if (!date || isNaN(date.getTime())) return;
        days.forEach(day => {
          const start = new Date(day.date); start.setHours(0,0,0,0);
          const end = new Date(day.date); end.setHours(23,59,59,999);
          if (date >= start && date <= end) day.count++;
        });
      });
      return days;
    }

    function calculateStats(rows) {
      const now = new Date(); now.setHours(0,0,0,0);
      const yesterday = new Date(now); yesterday.setDate(yesterday.getDate() - 1);
      let countSekarang = 0, countLalu = 0;
      rows.forEach(r => {
        const tgl = r.c[4]?.f || r.c[4]?.v;
        if (!tgl) return;
        const date = parseDate(tgl);
        if (!date || isNaN(date.getTime())) return;
        const dateOnly = new Date(date); dateOnly.setHours(0,0,0,0);
        if (dateOnly.getTime() === now.getTime()) countSekarang++;
        else if (dateOnly.getTime() === yesterday.getTime()) countLalu++;
      });
      return { countSekarang, countLalu };
    }

    function getPoinColor(p) {
      if (p === 'Ringan') return 'bg-success';
      if (p === 'Sedang') return 'bg-warning text-dark';
      if (p === 'Berat') return 'bg-danger';
      return 'bg-secondary';
    }

    let chartInstance = null;
    function renderChart(dailyData) {
      const ctx = document.getElementById('chartPelanggaran').getContext('2d');
      const labels = dailyData.map(d => d.label);
      const data = dailyData.map(d => d.count);
      if (chartInstance) chartInstance.destroy();
      chartInstance = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets: [{ label: 'Pelanggaran', data, borderColor: '#dc3545', backgroundColor: 'rgba(220,53,69,0.1)', borderWidth: 4, fill: true, tension: 0.4, pointBackgroundColor: '#000', pointBorderColor: '#fff', pointBorderWidth: 3, pointRadius: 6, pointHoverRadius: 8 }]},
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { backgroundColor: '#000', titleFont: { size: 14, weight: 'bold' }, bodyFont: { size: 13 }, padding: 12, cornerRadius: 8, callbacks: { label: function(context){ const fullLabel = dailyData[context.dataIndex].fullLabel; return `${fullLabel}: ${context.raw} pelanggaran`; } } } },
          scales: { y: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: 'rgba(0,0,0,0.1)' } }, x: { grid: { display: false } } }
        }
      });
    }

    async function init() {
      try {
        if (location.protocol === 'file:') console.warn('Running from file:// may block fetch requests. Use a local server for full functionality.');
        const res = await fetch(url);
        const text = await res.text();
        const json = JSON.parse(text.substr(47).slice(0, -2));
        const rows = json.table.rows || [];

        const stats = calculateStats(rows);
        const dailyData = calculateDailyData(rows);

        document.getElementById('countSekarang').innerText = stats.countSekarang;
        document.getElementById('countLalu').innerText = stats.countLalu;

        const trendEl = document.getElementById('trend');
        const diff = stats.countSekarang - stats.countLalu;
        if (diff > 0) { trendEl.innerHTML = '▲'; trendEl.style.color = 'red'; }
        else if (diff < 0) { trendEl.innerHTML = '▼'; trendEl.style.color = 'green'; }
        else { trendEl.innerHTML = '═'; trendEl.style.color = 'gray'; }

        const allViolations = rows.map(r => ({
          nama: r.c[0]?.v || '-',
          kelas: r.c[1]?.v || '-',
          hal: r.c[2]?.v || '-',
          poin: r.c[3]?.v || '-',
          tgl: r.c[4]?.f || r.c[4]?.v || '-',
          date: parseDate(r.c[4]?.f || r.c[4]?.v)
        })).filter(r => r.date).sort((a,b) => b.date - a.date);

        let html = '';
        if (allViolations.length === 0) {
          html = '<tr><td colspan="5" class="text-muted">Tidak ada data pelanggaran</td></tr>';
        } else {
          allViolations.forEach(r => {
            html += `<tr>
              <td class="fw-bold">${r.nama}</td>
              <td>${r.kelas}</td>
              <td class="text-uppercase small">${r.hal}</td>
              <td class="col-poin"><span class="badge ${getPoinColor(r.poin)} p-2 px-3">${r.poin}</span></td>
              <td class="text-muted small">${r.tgl}</td>
            </tr>`;
          });
        }
        document.getElementById('tableContent').innerHTML = html;

        renderChart(dailyData);
      } catch (e) {
        console.error('Error:', e);
        document.getElementById('tableContent').innerHTML = '<tr><td colspan="5" class="text-danger">Gagal memuat data</td></tr>';
      }
    }

    // Auto-refresh every 30s
    setInterval(init, 30000);

    // Menu toggle (idempotent)
    (function initMenuToggle(){
      const sidebar = document.querySelector('.sidebar-container');
      const toggle = document.querySelector('.mobile-nav-toggle');
      const main = document.querySelector('.main-content');
      if (!sidebar || !toggle) return;

      toggle.setAttribute('aria-expanded','false');

      function openSidebar(){ sidebar.classList.add('active'); toggle.setAttribute('aria-expanded','true'); main?.classList.add('menu-open-offset'); }
      function closeSidebar(){ sidebar.classList.remove('active'); toggle.setAttribute('aria-expanded','false'); main?.classList.remove('menu-open-offset'); }
      function toggleSidebar(e){ e?.stopPropagation(); sidebar.classList.contains('active') ? closeSidebar() : openSidebar(); }

      if (toggle.__click) toggle.removeEventListener('click', toggle.__click);
      toggle.__click = function(e){ e.stopPropagation(); toggleSidebar(); };
      toggle.addEventListener('click', toggle.__click);

      if (document.__outside) document.removeEventListener('click', document.__outside);
      document.__outside = function(e){
        if (window.innerWidth <= 992 && sidebar.classList.contains('active')) {
          if (!sidebar.contains(e.target) && !toggle.contains(e.target)) closeSidebar();
        }
      };
      document.addEventListener('click', document.__outside);

      if (document.__esc) document.removeEventListener('keydown', document.__esc);
      document.__esc = function(e){ if (e.key === 'Escape' && sidebar.classList.contains('active')) closeSidebar(); };
      document.addEventListener('keydown', document.__esc);

      sidebar.style.removeProperty('transform');
      sidebar.style.removeProperty('display');
      main?.style.removeProperty('margin-left');
      main?.style.removeProperty('padding-top');

      window.addEventListener('resize', function(){
        if (window.innerWidth > 992) { sidebar.classList.remove('active'); main?.classList.remove('menu-open-offset'); }
      });
    })();

    window.addEventListener('load', function(){
      document.getElementById('adminName').innerText = localStorage.getItem('namaLengkap') || 'Admin';
      const foto = localStorage.getItem('fotoProfil');
      if (foto) document.getElementById('fotoSiswa').src = foto;
      init();
    });

    window.logout = function(){ localStorage.clear(); window.location.href = 'index.html'; };

  })();
  </script>

</body>
</html>
