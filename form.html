<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPTATAS LEXACORE Input | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <img src="logof.png" alt="SIPTATAS LEXACORE Logo" class="mb-4" style="display: block; margin: 25px auto 0; width: 280px;">
            <h4 class="text-center mb-4">Sistem Informasi Pelanggaran Tata Tertib Siswa</h4>
        </div>
    </div>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm p-4">
                <h4 class="text-center mb-4">Form Pelanggaran</h4>
                <form id="formPelanggaran">
                    <div class="mb-3">
                        <label class="form-label">Nama Siswa</label>
                        <input type="text" name="nama" class="form-control" placeholder="e.g., John Doe, Jane Doe" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Kelas</label>
                        <input type="text" name="kelas" class="form-control" placeholder="e.g., X PPLG A, XI TO E" required pattern="[A-Z\s]+" title="Wajib pakai huruf KAPITAL semua ya!">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Pelanggaran</label>
                        <input type="text" name="pelanggaran" class="form-control" placeholder="e.g., Terlambat, Tidak Memakai Wearpack" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Poin</label>
                        <select name="poin" class="form-select" required>
                            <option value="">Pilih Poin Kualitatif</option>
                            <option class="bg-success text-white" value="Ringan">Ringan</option>
                            <option class="bg-warning text-dark" value="Sedang">Sedang</option>
                            <option class="bg-danger text-white" value="Berat">Berat</option>
                        </select>
                    </div>
                    <button type="submit" id="btnSimpan" class="btn btn-primary w-100">Simpan ke Sheets</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
