<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SIPTATAS | Dashboard Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Lexend', sans-serif; }
        body { background: #fff; min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header-profile { padding: 20px 40px; display: flex; justify-content: flex-end; align-items: center; }
        .user-meta { text-align: right; margin-right: 12px; }
        .profile-pic { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid #eee; }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .menu-grid { display: flex; gap: 60px; flex-wrap: wrap; justify-content: center; margin-top: 40px; }
        .menu-card { text-align: center; text-decoration: none !important; color: #333; transition: 0.3s; width: 160px; }
        .menu-card:hover { transform: translateY(-10px); }
        .menu-card img { width: 110px; height: auto; margin-bottom: 15px; }
        .menu-card p { font-weight: 600; font-size: 14px; text-transform: uppercase; }

        .btn-logout { position: fixed; bottom: 25px; right: 25px; border-radius: 50px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="header-profile">
        <div class="user-meta">
            <b id="adminName">Admin</b><br>
            <small class="text-muted">Administrator</small>
        </div>
        <img id="fotoSiswa" src="" class="profile-pic" alt="Avatar">
    </div>

    <div class="main-content">
        <img src="logo.png" alt="Logo" style="width: 280px; margin-bottom: 20px;">
        
        <div class="menu-grid">
            <a href="form.html" class="menu-card">
                <img src="form.svg" alt="Input">
                <p>Input Pelanggaran</p>
            </a>
            <a href="https://docs.google.com/spreadsheets/d/1qwOcgSU-UOx4s2iKluk3rMqDTwjewzB8XWYUXlx6g_A/edit" target="_blank" class="menu-card">
                <img src="sheet.svg" alt="Database">
                <p>Database Pelanggar</p>
            </a>
        </div>
    </div>

    <button class="btn btn-outline-danger btn-logout px-4" onclick="logout()">KELUAR</button>

    <script src="script.js"></script>
</body>
</html>
