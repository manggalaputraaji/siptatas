<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SIPTATAS | ADMIN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Lexend', sans-serif; }
        body { background: #fff; min-height: 100vh; display: flex; flex-direction: column; }
        .profile-header { padding: 20px 40px; display: flex; justify-content: flex-end; align-items: center; }
        .user-info { text-align: right; margin-right: 15px; }
        .profile-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid #eee; }
        .menu-container { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding-bottom: 50px; }
        .menu-grid { display: flex; gap: 50px; flex-wrap: wrap; justify-content: center; }
        .menu-item { text-align: center; text-decoration: none !important; transition: 0.2s; width: 150px; color: #444; }
        .menu-item:hover { transform: translateY(-8px); }
        .icon-wrapper img { width: 110px; height: auto; margin-bottom: 15px; }
        .menu-text { font-weight: 600; font-size: 13px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="profile-header">
        <div class="user-info">
            <b id="adminName">Admin</b>
            <span style="font-size: 12px; color: #888;">Administrator</span>
        </div>
        <img id="fotoSiswa" src="" class="profile-img">
    </div>

    <div class="text-center mt-3">
        <img src="logo.png" alt="Logo" style="width: 260px;">
    </div>

    <div class="menu-container">
        <div class="menu-grid">
            <a href="form.html" class="menu-item">
                <div class="icon-wrapper"><img src="form.svg"></div>
                <span class="menu-text">Input Pelanggaran</span>
            </a>
            <a href="https://docs.google.com/spreadsheets/d/12c0_2Dp3okLJPClmbJk5dk6PYD8N67RDjvzYPxadGqI/edit" target="_blank" class="menu-item">
                <div class="icon-wrapper"><img src="sheet.svg"></div>
                <span class="menu-text">Database Pelanggar</span>
            </a>
        </div>
    </div>

    <button class="btn btn-outline-danger m-4" onclick="logout()" style="position: fixed; bottom: 0; right: 0; border-radius: 50px;">Keluar</button>

    <script src="script.js"></script>
</body>
</html>
