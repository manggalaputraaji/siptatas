<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <title>LEXACORE | Database Pelanggar</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .sidebar-container { width: 350px !important; }
    .main-content { margin-left: 390px !important; width: calc(100% - 390px) !important; }
    @media (max-width: 992px) { .main-content { margin-left: 0 !important; width: 100% !important; } }
    
    body { opacity: 0; animation: pageFadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    @keyframes pageFadeIn { 0% { opacity: 0; transform: translateY(15px); } 100% { opacity: 1; transform: translateY(0); } }
    
    .box-bawah { border: 4px solid #000 !important; border-radius: 28px !important; }
    .table-responsive { border: 4px solid #000 !important; border-radius: 20px !important; }
    input.form-control { border: 4px solid #000 !important; border-radius: 15px !important; }
  </style>
</head>
<body>
  <button class="mobile-nav-toggle" aria-label="Toggle menu"><span></span></button>
  <div class="sidebar-container">
    <div class="nav-menu">
      <img src="logo.png" class="sidebar-logo" alt="Logo">
      <a href="dashboard.html" class="nav-link-custom" style="border-width: 4px !important;">HOME DASHBOARD</a>
      <a href="form.html" class="nav-link-custom" style="border-width: 4px !important;">INPUT PELANGGARAN</a>
      <a href="database.html" class="nav-link-custom active" style="border-width: 4px !important;">DATABASE PELANGGAR</a>
    </div>

    <div class="profile-section">
      <div class="profile-box" style="padding: 22px; border-radius: 22px; align-items: center; gap: 20px; background-color: #a0bbe1; border: 4px solid #000; display: flex; box-shadow: 0 5px 0 rgba(0,0,0,0.2);">
        <img id="fotoSiswa" src="" class="profile-pic-sm" alt="PFP" style="width: 85px; height: 110px; border-radius: 14px; background-color: #a0bbe1; border: 4px solid #000; object-fit: cover; flex-shrink: 0;">
        <div style="flex: 1; word-break: break-word;">
          <div id="adminName" style="font-size: 24px; font-weight: 900; line-height: 1.1; text-transform: uppercase; color: #000; letter-spacing: -0.5px;">ADMIN NAME</div>
          <div style="font-size: 13px; margin-top: 8px; font-weight: 800; color: #000; opacity: 0.8; text-transform: uppercase;">Administrator</div>
        </div>
      </div>
      <button onclick="logout()" style="width: 100%; margin-top: 15px; background: #ff2a2a; color: #fff; border: 4px solid #000; border-radius: 14px; padding: 15px; font-size: 22px; font-weight: 900; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; transition: transform 0.1s; box-shadow: 0 5px 0 rgba(0,0,0,0.2);">
        LOGOUT
      </button>
    </div>
  </div>

  <div class="main-content">
    <h1 style="font-weight: 900; font-size: 60px; margin-bottom: 10px; text-transform: uppercase;">DATABASE PELANGGAR</h1>
    <p class="text-muted fw-bold mb-5">SELURUH DATA REKAPITULASI SISWA</p>
    <div class="mb-4"><input type="text" id="searchInput" class="form-control" placeholder="CARI NAMA SISWA..." style="padding: 15px; font-weight: 800;"></div>
    <div class="box-bawah" style="min-height: 500px;">
      <div class="table-responsive">
        <table class="table text-center align-middle">
          <thead><tr><th>NAMA</th><th>KELAS</th><th>PELANGGARAN</th><th class="col-poin">POIN</th><th>TANGGAL</th></tr></thead>
          <tbody id="databaseContent"><tr><td colspan="5">Tarik data...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const DB_ID = '19aDh5DCRpV0FJzxa7Yw6teAhnRwHOCP-zS3g8-YA_sg';
    const url = `https://docs.google.com/spreadsheets/d/${DB_ID}/gviz/tq?tqx=out:json`;
    let allData = [];
    async function fetchDatabase() {
      try {
        const res = await fetch(url); const text = await res.text(); const json = JSON.parse(text.substr(47).slice(0, -2));
        allData = json.table.rows; renderTable(allData);
      } catch (e) { console.error("Error:", e); }
    }
    function renderTable(rows) {
      let html = ''; rows.forEach(r => {
        const nama = r.c[0]?.v || '-'; const kelas = r.c[1]?.v || '-'; const hal = r.c[2]?.v || '-'; const poin = r.c[3]?.v || '-'; const tgl = r.c[4]?.f || r.c[4]?.v || '-';
        html += `<tr><td class="fw-bold text-uppercase">${nama}</td><td>${kelas}</td><td class="text-start small">${hal}</td><td class="col-poin"><span class="badge ${getPoinColor(poin)} p-2 px-3">${poin}</span></td><td class="text-muted small">${tgl}</td></tr>`;
      });
      document.getElementById('databaseContent').innerHTML = html;
    }
    function getPoinColor(p) { if (p === 'Ringan') return 'bg-success'; if (p === 'Sedang') return 'bg-warning text-dark'; if (p === 'Berat') return 'bg-danger'; return 'bg-secondary'; }
    document.getElementById('searchInput').addEventListener('input', function(e) {
      const keyword = e.target.value.toLowerCase();
      const filtered = allData.filter(r => { const nama = r.c[0]?.v ? r.c[0].v.toLowerCase() : ''; return nama.includes(keyword); });
      renderTable(filtered);
    });
    window.onload = () => { document.getElementById('adminName').innerText = localStorage.getItem('namaLengkap') || 'Admin'; document.getElementById('fotoSiswa').src = localStorage.getItem('fotoProfil') || ''; fetchDatabase(); };
    function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    (function(){
      const toggle = document.querySelector('.mobile-nav-toggle'); const sidebar = document.querySelector('.sidebar-container');
      if (!toggle || !sidebar) return; toggle.addEventListener('click', function(e){ e.stopPropagation(); sidebar.classList.toggle('active'); });
    })();
  </script>
</body>
</html>
