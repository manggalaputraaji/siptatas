<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <title>LEXACORE | Database Pelanggar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sidebar-container">
        <div class="nav-menu">
            <img src="logo.png" class="sidebar-logo">
            <a href="dashboard.html" class="nav-link-custom">HOME DASHBOARD</a>
            <a href="form.html" class="nav-link-custom">INPUT PELANGGARAN</a>
            <a href="database.html" class="nav-link-custom active">DATABASE PELANGGAR</a>
        </div>
        
        <div class="profile-section">
            <div class="profile-box">
                <img id="fotoSiswa" src="" class="profile-pic-sm">
                <div>
                    <small class="fw-bold d-block">HALO!</small>
                    <span id="adminName" class="fw-bold d-block" style="font-size: 13px;">Admin</span>
                    <small style="font-size: 9px;">Administrator</small>
                </div>
            </div>
            <button class="btn btn-dark w-100 mt-3 fw-bold" onclick="logout()" style="border: 3px solid #000; border-radius: 12px;">LOGOUT</button>
        </div>
    </div>

    <div class="main-content">
        <h1 style="font-weight: 800; font-size: 55px; margin-bottom: 10px;">DATABASE PELANGGAR</h1>
        <p class="text-muted fw-bold mb-5">SELURUH DATA REKAPITULASI SISWA</p>

        <div class="mb-4">
            <input type="text" id="searchInput" class="form-control" placeholder="CARI NAMA SISWA..." 
            style="border: 4px solid #000; border-radius: 15px; padding: 15px; font-weight: 800;">
        </div>

        <div class="box-bawah" style="min-height: 500px;">
            <div class="table-responsive">
                <table class="table text-center align-middle">
                    <thead>
                        <tr>
                            <th>NAMA</th>
                            <th>KELAS</th>
                            <th>PELANGGARAN</th>
                            <th>POIN</th>
                            <th>TANGGAL</th>
                        </tr>
                    </thead>
                    <tbody id="databaseContent">
                        <tr><td colspan="5">Sedang menarik seluruh data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const DB_ID = '19aDh5DCRpV0FJzxa7Yw6teAhnRwHOCP-zS3g8-YA_sg';
        const url = `https://docs.google.com/spreadsheets/d/${DB_ID}/gviz/tq?tqx=out:json`;
        let allData = [];

        async function fetchDatabase() {
            try {
                const res = await fetch(url);
                const text = await res.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                allData = json.table.rows;
                renderTable(allData);
            } catch (e) {
                console.error("Gagal load database:", e);
            }
        }

        function renderTable(rows) {
            let html = '';
            rows.forEach(r => {
                const nama = r.c[0]?.v || '-';
                const kelas = r.c[1]?.v || '-';
                const hal = r.c[2]?.v || '-';
                const poin = r.c[3]?.v || '-';
                const tgl = r.c[4]?.f || r.c[4]?.v || '-';

                html += `<tr>
                    <td class="fw-bold text-uppercase">${nama}</td>
                    <td>${kelas}</td>
                    <td class="text-start small">${hal}</td>
                    <td><span class="badge ${getPoinColor(poin)} p-2 px-3">${poin}</span></td>
                    <td class="text-muted small">${tgl}</td>
                </tr>`;
            });
            document.getElementById('databaseContent').innerHTML = html;
        }

        function getPoinColor(p) {
            if (p === 'Ringan') return 'bg-success';
            if (p === 'Sedang') return 'bg-warning text-dark';
            if (p === 'Berat') return 'bg-danger';
            return 'bg-secondary';
        }

        // Live Search Logic
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase();
            const filtered = allData.filter(r => {
                const nama = r.c[0]?.v ? r.c[0].v.toLowerCase() : '';
                return nama.includes(keyword);
            });
            renderTable(filtered);
        });

        window.onload = () => {
            document.getElementById('adminName').innerText = localStorage.getItem('namaLengkap') || 'Admin';
            document.getElementById('fotoSiswa').src = localStorage.getItem('fotoProfil') || '';
            fetchDatabase();
        };

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
