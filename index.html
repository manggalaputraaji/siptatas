<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | LEXACORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Tambahan CDN SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        body { 
            background: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            flex-direction: column; 
        }
        .login-card { 
            border: 3px solid #000; 
            border-radius: 40px; 
            padding: 40px; 
            width: 100%; 
            max-width: 400px; 
            background: white; 
        }
        .btn-masuk { 
            background: #2c3e50; 
            color: white; 
            border-radius: 10px; 
            padding: 12px; 
            font-weight: bold; 
            width: 100%; 
            border: none; 
            margin-top: 10px; 
        }

        /* Memastikan font SweetAlert cocok dengan style LEXACORE */
        .swal2-popup { 
            font-family: 'Inter', sans-serif !important; 
            border: 4px solid #000 !important; 
            border-radius: 20px !important; 
        }
        .swal2-confirm { 
            font-weight: 800 !important; 
            border-radius: 10px !important; 
            background-color: #000 !important; 
            color: #fff !important; 
        }
        
        /* TAMBAHAN WARNA BORDER DINAMIS (Khusus merah untuk error) */
        .swal-border-error { 
            border-color: #ff2a2a !important; 
        }
        
        /* ANIMASI NOTIF MELUNCUR DARI ATAS */
        @keyframes slideDownAlert {
            0% { transform: translateY(-100%); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .swal-slide-down {
            animation: slideDownAlert 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards !important;
        }
    </style>
</head>
<body>
    <img src="logo.png" style="width: 200px; margin-bottom: 30px;">
    <div class="login-card">
        <form id="loginForm">
            <div class="mb-3">
                <label class="fw-bold">Username</label>
                <input type="text" id="user" class="form-control" placeholder="username" required style="border: 2px solid #000; border-radius: 10px;">
            </div>
            <div class="mb-4">
                <label class="fw-bold">Password</label>
                <input type="password" id="pass" class="form-control" placeholder="••••••••" required style="border: 2px solid #000; border-radius: 10px;">
            </div>
            <button type="submit" id="btnLogin" class="btn-masuk">MASUK</button>
        </form>
    </div>

    <script>
        const SHEET_ID_ADMIN = '1qwOcgSU-UOx4s2iKluk3rMqDTwjewzB8XWYUXlx6g_A';
        const GVIZ_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID_ADMIN}/gviz/tq?tqx=out:json`;

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userVal = document.getElementById('user').value.trim();
            const passVal = document.getElementById('pass').value.trim();
            const btn = document.getElementById('btnLogin');

            btn.disabled = true;
            btn.innerText = "Memverifikasi...";

            try {
                const res = await fetch(GVIZ_URL);
                const text = await res.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;

                let foundAcc = rows.find(r => {
                    const dbUser = r.c[1] ? (r.c[1].f || String(r.c[1].v)).trim() : '';
                    const dbPass = r.c[2] ? (r.c[2].f || String(r.c[2].v)).trim() : '';
                    return dbUser === userVal && dbPass === passVal;
                });

                if (foundAcc) {
                    localStorage.setItem('namaLengkap', foundAcc.c[0] ? foundAcc.c[0].v : userVal);
                    localStorage.setItem('fotoProfil', (foundAcc.c[3] && foundAcc.c[3].v) ? foundAcc.c[3].v : 'https://via.placeholder.com/45x60');
                    
                    // Langsung masuk ke dashboard tanpa alert
                    window.location.href = 'dashboard.html';
                } else {
                    Swal.fire({
                        position: "top",
                        icon: "error",
                        title: "AKSES DITOLAK!",
                        text: "Username atau Password Salah!",
                        showConfirmButton: true,
                        confirmButtonText: "Coba Lagi",
                        backdrop: "rgba(0,0,0,0.7)",
                        showClass: {
                            popup: 'swal-slide-down'
                        },
                        customClass: {
                            popup: 'swal-border-error'
                        }
                    });
                    btn.disabled = false; 
                    btn.innerText = "MASUK";
                }
            } catch (err) {
                Swal.fire({
                    position: "top",
                    icon: "error",
                    title: "GAGAL!",
                    text: "Gagal terhubung ke Database. Periksa koneksimu.",
                    showConfirmButton: true,
                    confirmButtonText: "Tutup",
                    backdrop: "rgba(0,0,0,0.7)",
                    showClass: {
                        popup: 'swal-slide-down'
                    },
                    customClass: {
                        popup: 'swal-border-error'
                    }
                });
                btn.disabled = false; 
                btn.innerText = "MASUK";
            }
        });
    </script>
</body>
</html>
