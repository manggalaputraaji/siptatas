<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | LEXACORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; flex-direction: column; }
        .login-card { border: 3px solid #000; border-radius: 40px; padding: 40px; width: 100%; max-width: 400px; background: white; }
        .btn-masuk { background: #2c3e50; color: white; border-radius: 10px; padding: 12px; font-weight: bold; width: 100%; border: none; margin-top: 10px; }
    </style>
</head>
<body>
    <img src="logo.png" style="width: 200px; margin-bottom: 30px;">
    <div class="login-card">
        <form id="loginForm">
            <div class="mb-3">
                <label class="fw-bold">Username</label>
                <input type="text" id="user" class="form-control" placeholder="username" required style="border: 2px solid #000; border-radius: 10px;">
            </div>
            <div class="mb-4">
                <label class="fw-bold">Password</label>
                <input type="password" id="pass" class="form-control" placeholder="••••••••" required style="border: 2px solid #000; border-radius: 10px;">
            </div>
            <button type="submit" id="btnLogin" class="btn-masuk">MASUK</button>
        </form>
    </div>

    <script>
        const SHEET_ID_ADMIN = '1qwOcgSU-UOx4s2iKluk3rMqDTwjewzB8XWYUXlx6g_A';
        const GVIZ_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID_ADMIN}/gviz/tq?tqx=out:json`;

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userVal = document.getElementById('user').value.trim();
            const passVal = document.getElementById('pass').value.trim();
            const btn = document.getElementById('btnLogin');

            btn.disabled = true;
            btn.innerText = "Memverifikasi...";

            try {
                const res = await fetch(GVIZ_URL);
                const text = await res.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;

                let foundAcc = rows.find(r => {
                    const dbUser = r.c[1] ? (r.c[1].f || String(r.c[1].v)).trim() : '';
                    const dbPass = r.c[2] ? (r.c[2].f || String(r.c[2].v)).trim() : '';
                    return dbUser === userVal && dbPass === passVal;
                });

                if (foundAcc) {
                    localStorage.setItem('namaLengkap', foundAcc.c[0] ? foundAcc.c[0].v : userVal);
                    localStorage.setItem('fotoProfil', (foundAcc.c[3] && foundAcc.c[3].v) ? foundAcc.c[3].v : 'https://via.placeholder.com/45x60');
                    window.location.href = 'dashboard.html';
                } else {
                    alert("Username atau Password Salah!");
                    btn.disabled = false; btn.innerText = "MASUK";
                }
            } catch (err) {
                alert("Gagal terhubung ke Database!");
                btn.disabled = false; btn.innerText = "MASUK";
            }
        });
    </script>
</body>
</html>
